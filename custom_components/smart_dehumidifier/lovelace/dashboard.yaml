# 智能除湿引擎 —— 打包界面卡片(全插件实体,零配置即用)
# 需 HACS 前端卡:Mushroom + button-card。用法:仪表盘→编辑→添加卡片→手动→粘贴。
type: vertical-stack
cards:
  # ---- 顶部:随湿度变色的大屏 ----
  - type: custom:button-card
    entity: sensor.smart_dehumidifier_humidity
    show_icon: false
    show_name: false
    show_state: false
    tap_action:
      action: more-info
    custom_fields:
      room: 智能除湿
      target: >-
        [[[ const t = states['sensor.smart_dehumidifier_learning_engine']?.attributes?.target_humidity; return `目标 ${t ? Math.round(t) : 60}%`; ]]]
      humidity: >-
        [[[
          const h = Number(entity?.state);
          return isNaN(h) ? '--%' : `${Math.round(h)}%`;
        ]]]
      label: >-
        [[[ return states['sensor.smart_dehumidifier_learning_engine']?.state || '正在积累样本'; ]]]
      action: >-
        [[[
          const e = states['sensor.smart_dehumidifier_learning_engine']?.attributes || {};
          const running = e.is_running;
          const t = running ? e.predicted_stop_time : e.predicted_next_start_time;
          if (t && !['--','unknown','unavailable',''].includes(t)) return running ? `预计 ${t} 关机` : `预计 ${t} 开机`;
          return running ? '除湿中…' : '环境稳定';
        ]]]
      chips: >-
        [[[
          const e = states['sensor.smart_dehumidifier_learning_engine']?.attributes || {};
          // 可信度跟随当前展示的预测:除湿中看关机预测、待机看开机预测(开机本就更难,会偏低)
          const conf = (e.is_running ? e.stop_confidence_cn : e.start_confidence_cn) || e.prediction_confidence_cn || '低';
          const pred = e.predictor === 'model' ? '本地模型' : '规则';
          const ctrl = states['switch.smart_dehumidifier_autonomous_control']?.state === 'on' ? '已接管' : '仅建议';
          return `${pred} · 可信度${conf} · ${ctrl}`;
        ]]]
    styles:
      card:
        - min-height: 232px
        - border-radius: 28px
        - padding: 18px 20px
        - box-shadow: none
        - overflow: hidden
        - border: >-
            [[[ const h = Number(entity?.state); if (isNaN(h)) return '1px solid color-mix(in srgb, var(--card-background-color) 78%, #9e9e9e 22%)'; if (h < 50) return '1px solid color-mix(in srgb, var(--card-background-color) 74%, #9c27b0 26%)'; if (h < 55) return '1px solid color-mix(in srgb, var(--card-background-color) 74%, #2196f3 26%)'; if (h < 65) return '1px solid color-mix(in srgb, var(--card-background-color) 76%, #4caf50 24%)'; if (h < 70) return '1px solid color-mix(in srgb, var(--card-background-color) 75%, #26a69a 25%)'; if (h < 80) return '1px solid color-mix(in srgb, var(--card-background-color) 74%, #ffc107 26%)'; return '1px solid color-mix(in srgb, var(--card-background-color) 74%, #f44336 26%)'; ]]]
        - background: >-
            [[[ const h = Number(entity?.state); if (isNaN(h)) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 86%, #9e9e9e 14%), color-mix(in srgb, var(--card-background-color) 95%, #9e9e9e 5%))'; if (h < 50) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 82%, #9c27b0 18%), color-mix(in srgb, var(--card-background-color) 94%, #9c27b0 6%))'; if (h < 55) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 82%, #2196f3 18%), color-mix(in srgb, var(--card-background-color) 94%, #2196f3 6%))'; if (h < 65) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 84%, #4caf50 16%), color-mix(in srgb, var(--card-background-color) 95%, #4caf50 5%))'; if (h < 70) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 84%, #26a69a 16%), color-mix(in srgb, var(--card-background-color) 95%, #26a69a 5%))'; if (h < 80) return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 83%, #ffc107 17%), color-mix(in srgb, var(--card-background-color) 95%, #ffc107 5%))'; return 'linear-gradient(180deg, color-mix(in srgb, var(--card-background-color) 83%, #f44336 17%), color-mix(in srgb, var(--card-background-color) 95%, #f44336 5%))'; ]]]
      grid:
        - grid-template-areas: '"room target" "humidity humidity" "label label" "action action" "chips chips"'
        - grid-template-columns: 1fr auto
        - grid-template-rows: min-content 1fr min-content min-content min-content
      custom_fields:
        room:
          - justify-self: start
          - font-size: 12px
          - font-weight: 700
          - color: var(--secondary-text-color)
        target:
          - justify-self: end
          - font-size: 12px
          - color: var(--secondary-text-color)
          - background: color-mix(in srgb, var(--card-background-color) 88%, var(--primary-text-color) 12%)
          - border: 1px solid color-mix(in srgb, var(--card-background-color) 78%, var(--primary-text-color) 22%)
          - padding: 7px 12px
          - border-radius: 999px
        humidity:
          - justify-self: center
          - align-self: center
          - font-size: clamp(88px, 14vw, 144px)
          - font-weight: 900
          - line-height: .88
          - color: var(--primary-text-color)
        label:
          - justify-self: center
          - font-size: 19px
          - font-weight: 800
          - color: var(--primary-text-color)
        action:
          - justify-self: center
          - margin-top: 4px
          - font-size: 17px
          - color: var(--primary-text-color)
          - text-align: center
        chips:
          - justify-self: center
          - margin-top: 12px
          - font-size: 12px
          - color: var(--primary-text-color)
          - background: color-mix(in srgb, var(--card-background-color) 90%, var(--primary-text-color) 10%)
          - border: 1px solid color-mix(in srgb, var(--card-background-color) 80%, var(--primary-text-color) 20%)
          - padding: 7px 13px
          - border-radius: 999px
          - white-space: normal
          - text-align: center

  # ---- 控制:目标湿度 / 运行模式 / 自主控制 ----
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-number-card
        entity: number.smart_dehumidifier_target_humidity
        name: 目标湿度
        icon: mdi:water-percent
        icon_color: purple
        display_mode: buttons
        layout: horizontal
        fill_container: true
      - type: custom:mushroom-select-card
        entity: select.smart_dehumidifier_operating_mode
        name: 运行模式
        icon: mdi:tune-variant
        icon_color: purple

  - type: custom:mushroom-entity-card
    entity: switch.smart_dehumidifier_autonomous_control
    name: 自主控制(开 = 由引擎接管开关机)
    icon: mdi:robot
    icon_color: >-
      {{ 'purple' if is_state('switch.smart_dehumidifier_autonomous_control','on') else 'grey' }}
    secondary_info: last-changed
    tap_action:
      action: toggle
    double_tap_action:
      action: more-info
    hold_action:
      action: more-info

  # ---- 预测与学习 ----
  - type: custom:mushroom-template-card
    primary: 预测与学习
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      {% set runs = state_attr(e,'dataset_runs') or 0 %}
      {% set rebounds = state_attr(e,'dataset_rebounds') or 0 %}
      {{ state_attr(e,'readiness_summary') or '仍在积累关键样本，当前以观察和建议为主。' }}
      \n除湿 {{ state_attr(e,'effective_drop_rate') or 0 }} · 回潮 {{ state_attr(e,'effective_rebound_rate') or 0 }} %/分
      · 最小运行 {{ state_attr(e,'min_runtime_minutes') or 30 }} 分 · 锁定 {{ state_attr(e,'lockout_minutes') or 45 }} 分
      \n下一步：{{ state_attr(e,'next_milestone') or '继续积累运行和回潮样本。' }}
    icon: mdi:brain
    icon_color: purple
    multiline_secondary: true

  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {{ (state_attr(e,'dataset_runs') or 0) }} / {{ (state_attr(e,'dataset_rebounds') or 0) }}
        secondary: 运行 / 回潮样本
        icon: mdi:play-circle-outline
        icon_color: blue
        fill_container: true
        layout: vertical
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {{ state_attr(e,'learning_stage_cn') or '观察积累中' }}
        secondary: 当前阶段
        icon: mdi:robot-outline
        icon_color: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {% if state_attr(e,'learning_stage') == 'takeover_ready' %} green
          {% elif state_attr(e,'learning_stage') == 'parameter_learning' %} amber
          {% else %} grey
          {% endif %}
        fill_container: true
        layout: vertical
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {% if state_attr(e,'drop_model_ready') and state_attr(e,'rebound_model_ready') %}
            双模型就绪
          {% elif state_attr(e,'drop_model_ready') %}
            下降模型就绪
          {% else %}
            尚未就绪
          {% endif %}
        secondary: 接管准备度
        icon: mdi:chart-line-variant
        icon_color: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {% if state_attr(e,'drop_model_ready') and state_attr(e,'rebound_model_ready') %} green
          {% elif state_attr(e,'drop_model_ready') %} teal
          {% else %} grey
          {% endif %}
        fill_container: true
        layout: vertical

  - type: custom:mushroom-template-card
    primary: 模型评估
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      下降模型：{{ '已可用' if state_attr(e,'model_drop_active') else '学习中' }}
      （{{ state_attr(e,'model_drop_samples') or 0 }} 条）
      · 回潮模型：{{ '已可用' if state_attr(e,'model_rebound_active') else '学习中' }}
      （{{ state_attr(e,'model_rebound_samples') or 0 }} 条）
      \n最近关机偏差：{% if state_attr(e,'recent_stop_bias_min') is not none %}{{ state_attr(e,'recent_stop_bias_min') }} 分钟 / {{ state_attr(e,'recent_stop_bias_samples') or 0 }} 次{% else %}样本不足{% endif %}
      · 最近开机偏差：{% if state_attr(e,'recent_start_bias_min') is not none %}{{ state_attr(e,'recent_start_bias_min') }} 分钟 / {{ state_attr(e,'recent_start_bias_samples') or 0 }} 次{% else %}样本不足{% endif %}
      \n{{ state_attr(e,'rebound_takeover_rule') or '回潮接管条件尚未建立。' }}
      \n当前状态：{{ state_attr(e,'rebound_takeover_blockers') or '正在评估中' }}
    icon: mdi:clipboard-data-outline
    icon_color: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      {% if state_attr(e,'rebound_takeover_ready') %} green
      {% elif state_attr(e,'model_drop_active') or state_attr(e,'model_rebound_active') %} teal
      {% else %} blue-grey
      {% endif %}
    multiline_secondary: true

  - type: custom:mushroom-template-card
    primary: 接管准备度
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      {{ state_attr(e,'rebound_takeover_summary') or '当前仍以固定规则为主。' }}
      \n{% if state_attr(e,'rebound_warmup_active') %}
        停机预热中，已停 {{ state_attr(e,'rebound_warmup_minutes') or 0 }} 分钟，回潮预测会先偏向历史样本。
      {% else %}
        {{ state_attr(e,'start_gate_status_cn') or '按阈值等待' }}
      {% endif %}
    icon: mdi:shield-check-outline
    icon_color: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      {% if state_attr(e,'rebound_takeover_allow_now') and state_attr(e,'control_enabled') %} green
      {% elif state_attr(e,'rebound_takeover_allow_now') %} teal
      {% else %} blue-grey
      {% endif %}
    multiline_secondary: true

  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {{ state_attr(e,'rebound_takeover_met_checks') or 0 }}/{{ state_attr(e,'rebound_takeover_total_checks') or 4 }} 项
        secondary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          已满足
          \n{{ state_attr(e,'rebound_takeover_met_items') or '暂未满足' }}
        icon: mdi:check-decagram-outline
        icon_color: green
        multiline_secondary: true
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {{ state_attr(e,'rebound_takeover_missing_checks') or 0 }} 项
        secondary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          还差多少
          \n{{ state_attr(e,'rebound_takeover_missing_items') or state_attr(e,'rebound_takeover_gap_summary') or '无' }}
        icon: mdi:progress-clock
        icon_color: amber
        multiline_secondary: true
      - type: custom:mushroom-template-card
        primary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {% if state_attr(e,'rebound_takeover_allow_now') and state_attr(e,'control_enabled') %}
            已参与接管
          {% elif state_attr(e,'rebound_takeover_allow_now') %}
            可进入接管
          {% else %}
            暂不允许
          {% endif %}
        secondary: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          当前是否允许接管
          \n{{ state_attr(e,'rebound_takeover_state_cn') or '固定规则主控' }}
        icon: mdi:swap-horizontal-circle-outline
        icon_color: >-
          {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
          {% if state_attr(e,'rebound_takeover_allow_now') and state_attr(e,'control_enabled') %} green
          {% elif state_attr(e,'rebound_takeover_allow_now') %} teal
          {% else %} grey
          {% endif %}
        multiline_secondary: true

  - type: custom:mushroom-template-card
    primary: 诊断与保护
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      过度除湿风险：{{ {'low':'低','medium':'中','high':'高'}.get(state_attr(e,'overdry_risk_level'),'低') }}
      · {{ state_attr(e,'overdry_risk_summary') or '当前未发现明显过度除湿风险。' }}
      \n异常诊断：{{ state_attr(e,'anomaly_title') or '状态稳定' }} · {{ state_attr(e,'anomaly_summary') or '当前没有发现明显异常。' }}
      \n建议：{{ state_attr(e,'anomaly_actions') or '继续按当前模式运行即可。' }}
    icon: mdi:stethoscope
    icon_color: >-
      {% set lvl = state_attr('sensor.smart_dehumidifier_learning_engine','anomaly_level') %}
      {% if lvl == 'warning' %} red
      {% elif lvl == 'notice' %} amber
      {% else %} teal
      {% endif %}
    multiline_secondary: true

  - type: custom:mushroom-template-card
    primary: 环境与健康
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      霉菌风险 {{ state_attr(e,'mold_risk_level') or '—' }}{% if state_attr(e,'dew_point_c') %} · 露点 {{ state_attr(e,'dew_point_c') }}℃{% endif %}
      · {{ state_attr(e,'external_advice') or '无外部环境调整' }}
    icon: mdi:home-thermometer-outline
    icon_color: teal
    multiline_secondary: true

  # ---- 水箱预测 ----
  - type: custom:mushroom-template-card
    primary: 水箱预测
    secondary: >-
      {% set e = 'sensor.smart_dehumidifier_learning_engine' %}
      约 {{ state_attr(e,'water_estimated_liters') or 0 }}L / {{ state_attr(e,'water_tank_capacity') or 3 }}L
      · {{ state_attr(e,'water_fill_percent') or 0 }}%
      · {{ state_attr(e,'water_level_text') or '水箱容量正常' }}
      · 估算来源:{{ state_attr(e,'water_rate_source') or '兜底估算' }}
    icon: mdi:cup-water
    icon_color: >-
      {% set f = state_attr('sensor.smart_dehumidifier_learning_engine','water_fill_percent') | float(0) %}
      {{ 'red' if f >= 90 else 'orange' if f >= 50 else 'cyan' }}
    multiline_secondary: true
  - type: custom:mushroom-number-card
    entity: number.smart_dehumidifier_tank_capacity
    name: 水箱容量
    icon: mdi:cup-water
    icon_color: cyan
    display_mode: buttons
  - type: custom:mushroom-template-card
    primary: 倒水校准
    secondary: 倒完水后,点一下"倒之前大概到哪个水位"
    icon: mdi:cup-water-outline
    icon_color: cyan
    multiline_secondary: true
  - type: grid
    columns: 5
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: 空了
        icon: mdi:cup-off-outline
        icon_color: blue
        layout: vertical
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.smart_dehumidifier_water_calibration
          data:
            option: 空了
      - type: custom:mushroom-template-card
        primary: 四分之一
        icon: mdi:cup-outline
        icon_color: cyan
        layout: vertical
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.smart_dehumidifier_water_calibration
          data:
            option: 四分之一
      - type: custom:mushroom-template-card
        primary: 二分之一
        icon: mdi:cup
        icon_color: teal
        layout: vertical
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.smart_dehumidifier_water_calibration
          data:
            option: 二分之一
      - type: custom:mushroom-template-card
        primary: 四分之三
        icon: mdi:cup-water
        icon_color: orange
        layout: vertical
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.smart_dehumidifier_water_calibration
          data:
            option: 四分之三
      - type: custom:mushroom-template-card
        primary: 已满
        icon: mdi:cup-water
        icon_color: red
        layout: vertical
        tap_action:
          action: call-service
          service: select.select_option
          target:
            entity_id: select.smart_dehumidifier_water_calibration
          data:
            option: 已满

  # ---- 湿度趋势 ----
  - type: history-graph
    title: 湿度趋势(24 小时)
    hours_to_show: 24
    entities:
      - entity: sensor.smart_dehumidifier_humidity
        name: 室内湿度

  # ---- 模型 ----
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.smart_dehumidifier_model_status
        name: 本地模型
        icon: mdi:chart-bell-curve-cumulative
      - type: custom:mushroom-template-card
        primary: 立即训练
        secondary: 用已积累数据训练
        icon: mdi:school-outline
        icon_color: purple
        tap_action:
          action: call-service
          service: smart_dehumidifier.train_model
